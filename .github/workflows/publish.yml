name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      skip-lerna:
        description: 'If true, skip lerna version/publish steps'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup npm
        run: |
          npm set "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
        env:
          CI: true
      - name: Check for skip lerna in commit message or inputs
        id: check_skip
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MESSAGE"
          COMMIT_LOWER=$(echo "$COMMIT_MESSAGE" | tr '[:upper:]' '[:lower:]')
          # Global skip tokens (skip entire CI)
          if [[ "${{ github.event.inputs.skip-lerna || '' }}" == 'true' ]] || [[ "$COMMIT_LOWER" == *"[skip-lerna]"* ]] || [[ "$COMMIT_LOWER" == *"[skip lerna]"* ]] || [[ "$COMMIT_LOWER" == *"[skip ci]"* ]] || [[ "$COMMIT_LOWER" == *"[ci skip]"* ]]; then
            echo "SKIP_LERNA=true" >> $GITHUB_ENV
          else
            echo "SKIP_LERNA=false" >> $GITHUB_ENV
          fi
      - name: Version and publish with Lerna
        if: env.SKIP_LERNA == 'false'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          npx lerna version --yes
          npx lerna publish from-package --yes

      - name: Publish CI summary
        run: |
          echo "Publish summary for run:"
          echo "SKIP_LERNA=${SKIP_LERNA:-false}"
          if [[ "${SKIP_LERNA:-false}" == 'true' ]]; then
            echo "Lerna: SKIPPED"
          else
            echo "Lerna: RAN"
          fi
